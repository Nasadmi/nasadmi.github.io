<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inciar Sesion</title>
    <!--MyCSS-->
    <link rel="stylesheet" href="style.css">
    <!--GOOGLE FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <!--AWESOME-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <!--ICON-->
    <link rel="shortcut icon" href="images/avatardefault_92824 (1).png"image/x-icon">
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="subtitle">
                <h2>Incio de Sesion</h2>
                <div class="navigation">
                    <nav>
                        <ul class="add-icon">
                            <li>
                                <a href="#"><i class="fa-solid fa-user-plus"></i></a>
                            </li>
                        </ul>
                        <ul class="add-text">
                            <li>
                                <a href="#" class="">Registrarse</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
            <div class="inside">
                <h3>Nombre de Usuario o Direccion de Correo Electronico:</h3>
                <input type="text" class="insert" name="direction_or_nameuser" placeholder="Correo o Nombre">
            </div>
            <div class="inside">
                <h3>Contaseña: </h3>
                <input type="password" class="insert" name="password" spellcheck="false" placeholder="Contraseña">
            </div>
            <div class="content-btn">
                <a href="#" class="btn">Inciar Sesion</a>
            </div>
        </div>
    </div>
</body>
</html>
